name: CI/CD Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "9.0.x"

    - name: Restore
      run: dotnet restore CloudNativeInventory.sln

    - name: Build
      run: dotnet build CloudNativeInventory.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test CloudNativeInventory.sln --configuration Release --no-build

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to ACR
      uses: azure/docker-login@v2
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/inventory-api:${{ github.sha }} .
        docker tag ${{ secrets.ACR_LOGIN_SERVER }}/inventory-api:${{ github.sha }} \
                    ${{ secrets.ACR_LOGIN_SERVER }}/inventory-api:latest

    - name: Push Docker image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/inventory-api:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/inventory-api:latest

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: ${{ secrets.CONTAINER_APP_NAME }}
        resourceGroup: ${{ secrets.RESOURCE_GROUP }}
        imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/inventory-api:${{ github.sha }}
